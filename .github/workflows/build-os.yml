name: Build Sovereign OS
on: [push, workflow_dispatch] # Runs on every push or manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Pioneer Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev rsync cpio python3 unzip bc wget libssl-dev

      - name: Execute Build Script
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload Finished Image
        uses: actions/upload-artifact@v4
        with:
          name: pioneer-sdcard-image
          path: buildroot/output/images/sdcard.img
